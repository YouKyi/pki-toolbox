services:
  pki-toolbox:
    # Always run a pinned, immutable release tag, never `latest`. Override the
    # version with PKI_TOOLBOX_TAG; for the strongest guarantee pin a digest
    # (PKI_TOOLBOX_TAG=v1.0.0@sha256:...).
    image: ${CI_REGISTRY_IMAGE:-pki-toolbox}:${PKI_TOOLBOX_TAG:-v1.0.3}
    # To build the image locally instead of pulling it, comment out `image`
    # above and uncomment the line below:
    # build: .
    container_name: pki-toolbox
    ports:
      - '8080:8080'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # SEC-04: mount the root filesystem read-only to prevent any runtime writes
    # outside of explicitly declared tmpfs mounts. The nginx process only needs
    # to write its pid file and temp directories, all configured under /tmp in
    # nginx-main.conf, plus /var/cache/nginx owned by the app user at build time.
    read_only: true
    tmpfs:
      # pid file: pid /tmp/nginx.pid (nginx-main.conf line 8)
      # temp dirs: client_body_temp_path, proxy_temp_path, fastcgi_temp_path,
      #            uwsgi_temp_path, scgi_temp_path (nginx-main.conf lines 26-30)
      - /tmp:mode=1777,size=64m
      # nginx may write cache metadata here; owned by app user (Dockerfile line 33)
      - /var/cache/nginx:mode=0755,size=32m
    # Resource limits — plain service-level form (mem_limit / cpus) instead of
    # deploy.resources.limits because this stack is run with plain `docker compose`,
    # not `docker stack deploy`. The deploy.resources key is silently ignored
    # outside of Swarm mode, so the service-level keys are the correct choice here.
    mem_limit: '128m'
    cpus: 0.50
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
