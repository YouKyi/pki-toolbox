# Main nginx configuration for the pki-toolbox image.
#
# Replaces the stock /etc/nginx/nginx.conf so the server runs cleanly as a
# non-root user: no `user` directive, and the pid file lives in /tmp (always
# writable) instead of /run (which can be shadowed by a runtime tmpfs).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	access_log /dev/stdout;

	sendfile on;
	tcp_nopush on;
	keepalive_timeout 65;

	# nginx writes temporary files here; /tmp is writable by the app user.
	client_body_temp_path /tmp/nginx-client-body;
	proxy_temp_path /tmp/nginx-proxy;
	fastcgi_temp_path /tmp/nginx-fastcgi;
	uwsgi_temp_path /tmp/nginx-uwsgi;
	scgi_temp_path /tmp/nginx-scgi;

	include /etc/nginx/conf.d/*.conf;
}
