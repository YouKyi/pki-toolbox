stages:
  - lint
  - test
  - build
  - docker
  - scan
  - release

variables:
  IMAGE: $CI_REGISTRY_IMAGE
  TAG_SHA: $CI_COMMIT_SHORT_SHA

# Run exactly one pipeline per change: a merge-request pipeline when an MR is
# open, otherwise a branch pipeline, plus tag pipelines.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

# Node jobs share the same image, a pnpm-store cache and the install step.
default:
  image: node:20-alpine
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

lint:
  stage: lint
  needs: []
  script:
    - pnpm lint
    - pnpm check

test:
  stage: test
  needs: []
  script:
    - pnpm test

build:
  stage: build
  needs: []
  script:
    - pnpm build
  artifacts:
    paths:
      - build/
    expire_in: 1 day

# Builds the Docker image and pushes it to the GitLab Container Registry.
# Docker-in-Docker config mirrors the working pipeline of youkyi/unifi-flowmatrix
# on this GitLab instance: TLS disabled and the job pinned to the `docker` runner.
docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  tags:
    - docker
  cache: {}
  needs:
    - job: build
      artifacts: false
  variables:
    DOCKER_TLS_CERTDIR: ''
    DOCKER_BUILDKIT: '1'
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Warm the BuildKit layer cache from the previously published image.
    - docker pull "$IMAGE:latest" || true
    - >-
      docker build
      --build-arg BUILDKIT_INLINE_CACHE=1
      --cache-from "$IMAGE:latest"
      -t "$IMAGE:$TAG_SHA" .
    # Push only from the default branch and from tags, never from feature branches/MRs.
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] || [ -n "$CI_COMMIT_TAG" ]; then
        docker push "$IMAGE:$TAG_SHA"
      fi
    # `latest` is a rolling tag for the build cache and quick trials only.
    # Deployments must pin an immutable tag: the per-commit `:$TAG_SHA` or the
    # per-release `:$CI_COMMIT_TAG`, ideally by digest.
    - if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then docker tag "$IMAGE:$TAG_SHA" "$IMAGE:latest" && docker push "$IMAGE:latest"; fi
    - if [ -n "$CI_COMMIT_TAG" ]; then docker tag "$IMAGE:$TAG_SHA" "$IMAGE:$CI_COMMIT_TAG" && docker push "$IMAGE:$CI_COMMIT_TAG"; fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

# Scans the freshly built image for OS and dependency CVEs. A HIGH or CRITICAL
# vulnerability that has a fix available fails the pipeline, so a vulnerable
# image can never be released. Runs only where the docker job pushed the image.
scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: ['']
  needs:
    - docker
  cache: {}
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  before_script: []
  script:
    - trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 "$IMAGE:$TAG_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Publishes a GitLab Release whenever a semver tag (vX.Y.Z) is pushed.
# release-cli is version-pinned so Renovate keeps it current.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:v0.16.0
  needs:
    - docker
    - scan
  cache: {}
  before_script: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Publishing GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: pki-toolbox $CI_COMMIT_TAG
    description: 'Container image: `$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG`. See CHANGELOG.md for the release notes.'

