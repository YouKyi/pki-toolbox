stages:
  - lint
  - test
  - build
  - docker
  - release

variables:
  IMAGE: $CI_REGISTRY_IMAGE
  TAG_SHA: $CI_COMMIT_SHORT_SHA

# Node jobs share the same image and dependency install step.
default:
  image: node:20-alpine
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile

lint:
  stage: lint
  script:
    - pnpm lint
    - pnpm check

test:
  stage: test
  script:
    - pnpm test

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - build/
    expire_in: 1 day

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE:$TAG_SHA" .
    - docker push "$IMAGE:$TAG_SHA"
    - if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then docker tag "$IMAGE:$TAG_SHA" "$IMAGE:latest" && docker push "$IMAGE:latest"; fi
    - if [ -n "$CI_COMMIT_TAG" ]; then docker tag "$IMAGE:$TAG_SHA" "$IMAGE:$CI_COMMIT_TAG" && docker push "$IMAGE:$CI_COMMIT_TAG"; fi
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# Publishes a GitLab Release whenever a semver tag (vX.Y.Z) is pushed.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Publishing GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: pki-toolbox $CI_COMMIT_TAG
    description: 'Container image: `$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG`. See CHANGELOG.md for the release notes.'

