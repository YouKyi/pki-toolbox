stages:
  - lint
  - test
  - build
  - docker

variables:
  IMAGE: $CI_REGISTRY_IMAGE
  TAG_SHA: $CI_COMMIT_SHORT_SHA
  TAG_LATEST: latest

# Node jobs share the same image and dependency install step.
default:
  image: node:20-alpine
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile

lint:
  stage: lint
  script:
    - pnpm lint
    - pnpm check

test:
  stage: test
  script:
    - pnpm test

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - build/
    expire_in: 1 day

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE:$TAG_SHA" -t "$IMAGE:$TAG_LATEST" .
    - docker push "$IMAGE:$TAG_SHA"
    - if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then docker push "$IMAGE:$TAG_LATEST"; fi
  rules:
    - if: $CI_COMMIT_BRANCH

