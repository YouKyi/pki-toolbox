# pki-toolbox — static site served on a non-root port.
#
# Content-Security-Policy is NOT set here: SvelteKit emits it as a <meta> tag
# on every prerendered page (see `csp` in svelte.config.js). A header CSP would
# be enforced on top of it and block the hashed inline bootstrap script.

server {
	listen 8080;
	listen [::]:8080;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	# Compression for text assets.
	gzip on;
	gzip_vary on;
	gzip_min_length 256;
	gzip_comp_level 6;
	gzip_types text/css text/javascript application/javascript application/json image/svg+xml;

	# Security headers (applied to every page response).
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Referrer-Policy "no-referrer" always;

	# Content-hashed build assets — cache aggressively and forever.
	# A nested location with add_header drops inherited headers, so the
	# security headers are repeated here on purpose.
	location /_app/immutable/ {
		expires 1y;
		add_header Cache-Control "public, immutable" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Referrer-Policy "no-referrer" always;
	}

	# Routing — adapter-static writes each route as a flat `<route>.html`,
	# so `$uri.html` is tried before falling back to the prerendered shell.
	location / {
		try_files $uri $uri.html $uri/ /index.html;
		add_header Cache-Control "no-cache" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Referrer-Policy "no-referrer" always;
	}
}
