# pki-toolbox, static site served on a non-root port.
#
# The main Content-Security-Policy is emitted by SvelteKit as a <meta> tag on
# every prerendered page (see `csp` in svelte.config.js); a full header CSP
# would be enforced on top of it and block the hashed inline bootstrap script.
# nginx only adds a CSP header limited to `frame-ancestors` (which a <meta> tag
# cannot express) so it does not interfere with the meta policy.

server {
	listen 8080;
	listen [::]:8080;
	server_name _;
	server_tokens off;

	root /usr/share/nginx/html;
	index index.html;

	# Compression for text assets.
	gzip on;
	gzip_vary on;
	gzip_min_length 256;
	gzip_comp_level 6;
	gzip_types text/css text/javascript application/javascript application/json image/svg+xml text/plain;

	# Content-hashed build assets, cached aggressively and forever. Security
	# headers are intentionally not repeated here: they are irrelevant on
	# static JS/CSS asset responses and `add_header` would not inherit anyway.
	location /_app/immutable/ {
		expires 1y;
		add_header Cache-Control "public, immutable" always;
	}

	# Routing: adapter-static writes each route as a flat `<route>.html`,
	# so `$uri.html` is tried before falling back to the prerendered shell.
	location / {
		try_files $uri $uri.html $uri/ /index.html;
		add_header Cache-Control "no-cache" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Referrer-Policy "no-referrer" always;
		add_header Content-Security-Policy "frame-ancestors 'none'" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), payment=()" always;
		add_header Cross-Origin-Opener-Policy "same-origin" always;
		add_header Cross-Origin-Resource-Policy "same-origin" always;
	}
}
